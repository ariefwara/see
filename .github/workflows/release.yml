name: build-and-release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runs-on: ubuntu-latest
            ext: ''
          - goos: windows
            goarch: amd64
            runs-on: windows-latest
            ext: '.exe'
          - goos: darwin
            goarch: amd64
            runs-on: macos-13
            ext: ''
          - goos: darwin
            goarch: arm64
            runs-on: macos-latest
            ext: ''

    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install Fyne dependencies (Linux)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Install Fyne dependencies (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          choco install mingw --no-progress -y
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $GITHUB_PATH

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.goos == 'windows' && 'x86_64-w64-mingw32-gcc' || '' }}
        run: |
          go build -o see-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - uses: actions/upload-artifact@v4
        with:
          name: see-${{ matrix.goos }}-${{ matrix.goarch }}
          path: see-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: see-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum see-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            see-*
          generate_release_notes: true
